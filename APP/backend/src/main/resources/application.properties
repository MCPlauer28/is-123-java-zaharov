# Database Configuration (Firebird)
spring.datasource.url=jdbc:firebirdsql://localhost:3050/Z:/java-curs-ilya/APP/bd.fdb?encoding=UTF8
spring.datasource.driver-class-name=org.firebirdsql.jdbc.FBDriver
spring.datasource.username=sysdba
spring.datasource.password=masterkey

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.FirebirdDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security & JWT Configuration
# In production, use a longer, secret key
blog.app.jwtSecret=SecretKeyForJWTGenerationThatIsLongEnoughToMeetTheSecurityRequirementsOfTheJJWTLibrary
blog.app.jwtExpirationMs=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Server port
server.port=8080
